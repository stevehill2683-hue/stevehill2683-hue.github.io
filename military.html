<style>
:root {
    --bg: #f5f1e9;
    --paper: #fffaf1;
    --ink: #2c251e;
    --muted: #6e6257;
    --accent: #6e3f1f;
    --accent-dark: #432611;
    --line: #ddcfba;
    --shadow: 0 18px 40px rgba(44, 37, 30, 0.16);
}

* {
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
}

header {
    background: var(--accent-dark);
    color: white;
    padding: 40px 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 2.4rem;
}

header p {
    margin-top: 10px;
    color: #f0e5d4;
}

nav {
    background: var(--accent);
    padding: 12px;
    text-align: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 12px;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

main {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
}

section {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 30px;
    box-shadow: var(--shadow);
}

h2 {
    color: var(--accent-dark);
    border-bottom: 2px solid var(--line);
    padding-bottom: 8px;
}

p {
    font-size: 1rem;
}

.photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 22px;
}

.photo-card {
    background: #fffdf7;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(44, 37, 30, 0.10);
}

.photo-card img {
    width: 100%;
    height: 260px;
    object-fit: contain;
    display: block;
    border-radius: 8px;
    cursor: pointer;
    background: #f8efe2;
}

.photo-card p {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 0.95rem;
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.9);
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.lightbox.active {
    display: flex;
}

.lightbox img {
    max-width: 95vw;
    max-height: 95vh;
    object-fit: contain;
    border-radius: 6px;
}

footer {
    text-align: center;
    padding: 25px;
    color: var(--muted);
}

/* MOBILE */
@media (max-width: 600px) {
    header h1 {
        font-size: 1.8rem;
    }

    nav a {
        display: inline-block;
        margin: 6px;
    }

    section {
        padding: 20px;
    }

    .photo-card img {
        height: 220px;
    }
}
</style>
