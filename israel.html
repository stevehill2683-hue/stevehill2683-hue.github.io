<section class="israel-topic" id="title-9">
    <h2>Megiddo</h2>
    <p>Photos and memories from this part of our visit to Israel.</p>

    <section class="gallery" id="megiddo-gallery"></section>

    <a class="back-to-toc-button" href="#toc">Back to Table of Contents</a>
</section>

<div class="israel-topic-divider"></div>

<script>
    const megiddoImages = [
        {
            src: "Megiddo History and Prophecy 1.jpg",
            alt: "Megiddo history and prophecy image 1",
            caption: "Megiddo history and prophecy."
        },

        ...Array.from({ length: 67 }, (_, index) => {
            const number = index + 2;

            return {
                src: `Megiddo ${number}.jpg`,
                alt: `Megiddo image ${number}`,
                caption: `Megiddo image ${number}.`
            };
        }),

        {
            src: "Megiddo AI image 31-32 69.png",
            alt: "Megiddo AI reconstruction image 69",
            caption: "AI reconstruction based on Megiddo images 31 and 32."
        }
    ];

    document.getElementById("megiddo-gallery").innerHTML = megiddoImages
        .map((image, index) => `
            <div class="photo-card" data-search="megiddo image ${index + 1} israel holy land">
                <img src="${image.src}"
                     alt="${image.alt}"
                     class="zoom-photo"
                     tabindex="0"
                     loading="lazy"
                     decoding="async">
                <p>${image.caption}</p>
            </div>
        `)
        .join("");
</script>
