<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faith | Steve & Anita Hill Family & Home</title>
    <link rel="stylesheet" href="style.css" />

    <style>
        .faith-page {
            padding: 22px 28px;
        }

        .faith-page h1 {
            margin-bottom: 8px;
        }

        .faith-intro {
            margin: 0 0 16px;
            color: #4a3a2d;
            font-size: 1rem;
        }

        .faith-verse {
            background: #303030;
            color: #fffaf1;
            border: 1px solid #ddcfba;
            border-radius: 14px;
            padding: 18px 22px;
            margin: 16px 0 18px;
            box-shadow: 0 8px 18px rgba(44, 37, 30, 0.18);
        }

        .faith-verse p {
            margin: 0;
            color: #fffaf1;
            font-size: 1rem;
            line-height: 1.55;
            font-weight: bold;
        }

        .faith-verse .verse-ref {
            margin-top: 10px;
            font-style: italic;
            font-weight: bold;
        }

        .faith-topic-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-top: 18px;
        }

        .faith-topic-card {
            background: #432611;
            border: 1px solid #ddcfba;
            border-radius: 14px;
            padding: 18px 20px;
            color: #fffaf1;
            box-shadow: 0 8px 18px rgba(44, 37, 30, 0.18);
            transition:
                transform 0.25s ease,
                box-shadow 0.25s ease,
                border-color 0.25s ease,
                background 0.25s ease;
        }

        .faith-topic-card:hover,
        .faith-topic-card:focus-within {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(44, 37, 30, 0.30);
            border-color: #fffaf1;
            background: #5a3218;
        }

        .faith-topic-card h2 {
            margin: 0 0 8px;
            padding: 0;
            border: none;
            color: #fffaf1;
            font-size: 1.25rem;
        }

        .faith-topic-card p {
            margin: 0;
            color: #fffaf1;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        @media (max-width: 900px) {
            .faith-topic-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 600px) {
            .faith-topic-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header class="site-header">
        <a class="site-title" href="index.html">Steve & Anita Hill</a>
        <p>Faith • Family • Military Service • Memories • Projects • General</p>

        <nav class="top-nav">
            <a href="index.html">Home</a>
            <a href="military.html">Military</a>
            <a href="family.html">Family</a>
              <a href="israel.html">Israel</a>
            <a href="projects.html">Projects</a>
            <a href="general.html">General</a>
        </nav>
    </header>

        <footer class="fixed-bottom-text">
        <p>“As for me and my house, we will serve the LORD.” — Joshua 24:15</p>
        <p class="small">© Steve & Anita Hill. Personal family website.</p>
    </footer>

    <div id="photoLightbox" class="photo-lightbox" role="dialog" aria-modal="true">
        <img id="photoLightboxImg" src="" alt="Expanded photo">
    </div>

    <script>
        const lightbox = document.getElementById("photoLightbox");
        const lightboxImg = document.getElementById("photoLightboxImg");
        const zoomPhotos = document.querySelectorAll(".zoom-photo");

        zoomPhotos.forEach(photo => {
            photo.addEventListener("click", () => {
                lightboxImg.src = photo.src;
                lightbox.classList.add("active");
            });
        });

        lightbox.addEventListener("click", () => {
            lightbox.classList.remove("active");
            lightboxImg.src = "";
        });
    </script>

    <div class="site-version-badge">Ver 11.6</div>

    <a href="#" class="back-to-top">Top ↑</a>

</body>
</html>
